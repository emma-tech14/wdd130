    <meta charset="UTF-8">

        content="BB White Water Rafting Adventures offers thrilling rafting trips, expert guides,and unforgettable outdoor experiences for all skill level">

<body>
    <header>
        <img src="images/logo.jpg" alt="BB White Water Rafting Adventures logo" width="120">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>

    </header>

    <main>
        <h1>contact us</h1>
        <section class="company-information">

            <h1>Amazing Adventures</h1>

            <p>No 4 Mariam Babaginder road<br>
                Asaba-Town, Delta State<br>
                Nigeria<br>
                + 234 813 064 1231<br>
                BB@whitewater.com
            </p>

        </section>
        <section class="contact-section">

            <div class="map">
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m10!1m8!1m3!1d1017785.3012264122!2d7.0047965!3d4.8174104!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sng!4v1765510329359!5m2!1sen!2sng"
                    width="400" height="400" allowfullscreen="" loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>
            <div class="contact-form">
            <form>
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>

                <p>message purpose</p>

                <label>
                    <input type="radio" name="purpose" value="general" required>
                    General Inquiry
                </label>

                <label>
                    <input type="radio" name="purpose" value="reservation">
                    Reservation Question
                </label>

                <label>
                    <input type="radio" name="purpose" value="suggestion">
                    Website Suggestion
                </label>

                <label for="message">Message</label>
                <textarea id="message" name="message"></textarea>

                <label>
                    <input type="checkbox" name="subscribe">
                    Please subscribe to me to the monthly newsletter
                </label>

                <button type="submit">Get in Touch!</button>
            </form>
            </div>
        </section>

        <section class="employees">
            <h2>We Are Here to Serve You</h2>

            <div class="profiles">
                <figure>
                    <img src="images/employee1.jpg" alt="first employee" width="200" height="auto">
                    <figcaption>Jason - Rafting Manager</figcaption>
                </figure>

                <figure>
                    <img src="images/emplyee2.webp" alt="second employee" width="200">
                    <figcaption>Beatrice - Control Operator</figcaption>
                </figure>

                <figure>
                    <img src="images/employee3.webp" alt="third employee" width="200">
                    <figcaption>Tonia- Safety Officer</figcaption>
                </figure>
            </div>
        </section>

    </main>

    <footer>

            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin-square.svg" alt="LinkedIn Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram-square.svg" alt="Instagram Icon">
            </a>    
        </nav>
    </footer>

</body>

</html>
